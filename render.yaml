services:
  - type: web
    name: church-care-api
    runtime: node
    rootDir: api
    buildCommand: npm install
    preDeployCommand: npm run migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: church-care-db
          property: connectionString
      - key: RUN_STARTUP_MIGRATIONS
        value: "false"
      - key: CLIENT_ORIGIN
        sync: false

databases:
  - name: church-care-db
    databaseName: churchcare
    user: churchcare
